[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]

[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ===========================================
# DOMAIN REDIRECTS - Consolidate all to primary
# ===========================================

# Redirect from rohrreinigungkraft.de (without hyphen) to rohrreinigung-kraft.de
[[redirects]]
  from = "https://rohrreinigungkraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rohrreinigungkraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.rohrreinigungkraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.rohrreinigungkraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

# Redirect www version of primary domain
[[redirects]]
  from = "https://www.rohrreinigung-kraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.rohrreinigung-kraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rohrreinigung-kraft.de/*"
  to = "https://rohrreinigung-kraft.de/:splat"
  status = 301
  force = true

